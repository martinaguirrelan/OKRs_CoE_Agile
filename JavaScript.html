<script>
  // Estado en memoria del cliente.
  var STATE = { objetivos: [], keyResults: [], checkins: [], iniciativas: [], scrumMasters: [], gerencias: [], tree: [], trimestres: [], resumen: {} };

  var ESTADO_INI_LABEL = { 'pendiente': 'Pendiente', 'en-progreso': 'En progreso', 'bloqueada': 'Bloqueada', 'hecha': 'Hecha' };

  // ---------- Utilidades ----------
  function $(id) { return document.getElementById(id); }
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function toast(msg, isErr) {
    var t = $('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isErr ? ' err' : '');
    setTimeout(function () { t.className = 'toast'; }, 2600);
  }
  function estadoLabel(e) {
    return { 'on-track': 'On track', 'at-risk': 'En riesgo', 'off-track': 'Fuera de ruta' }[e] || e;
  }

  // ---------- Navegación por pestañas ----------
  document.querySelectorAll('.tab').forEach(function (tab) {
    tab.addEventListener('click', function () {
      document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('active'); });
      document.querySelectorAll('.view').forEach(function (v) { v.classList.remove('active'); });
      tab.classList.add('active');
      $(tab.dataset.view).classList.add('active');
    });
  });

  // ---------- Carga inicial ----------
  function bootstrap() {
    google.script.run
      .withSuccessHandler(function (data) {
        STATE = data;
        renderAll();
      })
      .withFailureHandler(function (err) { toast(err.message || err, true); })
      .getBootstrapData();
  }

  function refresh() { bootstrap(); }

  function renderAll() {
    fillGerenciaSelects();
    fillSelect($('dashTrimestre'), STATE.trimestres, 'Todos');
    fillSelect($('mapaTrimestre'), STATE.trimestres, 'Todos');
    fillSelect($('rep_trimestre'), STATE.trimestres, null);
    fillScrumMasterSelect();
    renderGerencias();
    renderScrumMasters();
    renderViews();
  }

  // Re-render de todas las vistas dependientes de la gerencia activa.
  function renderViews() {
    fillObjetivoSelect();
    fillKrSelect();
    fillIniKrSelect();
    renderResumen();
    renderTree();
    renderMapa();
    renderOkrList();
    renderIniciativas();
    renderCheckins();
  }

  // ---------- Gerencia activa (filtro global) ----------
  function gerenciaActiva() { return $('gerenciaActiva').value; }

  function gerNombre(id) {
    var g = STATE.gerencias.filter(function (x) { return String(x.id) === String(id); })[0];
    return g ? g.nombre : '';
  }

  // Devuelve los datos filtrados por la gerencia activa ('' = todas).
  function scoped() {
    var g = gerenciaActiva();
    if (!g) {
      return { objetivos: STATE.objetivos, keyResults: STATE.keyResults,
        iniciativas: STATE.iniciativas, checkins: STATE.checkins, tree: STATE.tree };
    }
    var objetivos = STATE.objetivos.filter(function (o) { return String(o.gerenciaId) === g; });
    var objIds = {}; objetivos.forEach(function (o) { objIds[o.id] = true; });
    var keyResults = STATE.keyResults.filter(function (k) { return objIds[k.objetivoId]; });
    var krIds = {}; keyResults.forEach(function (k) { krIds[k.id] = true; });
    return {
      objetivos: objetivos,
      keyResults: keyResults,
      iniciativas: STATE.iniciativas.filter(function (i) { return krIds[i.krId]; }),
      checkins: STATE.checkins.filter(function (c) { return krIds[c.krId]; }),
      tree: STATE.tree.filter(function (n) { return String(n.objetivo.gerenciaId) === g; })
    };
  }

  function fillGerenciaSelects() {
    // Selector global (cabecera): Todas + gerencias.
    var sel = $('gerenciaActiva');
    var current = sel.value;
    sel.innerHTML = '<option value="">Todas</option>' + STATE.gerencias.map(function (g) {
      return '<option value="' + esc(g.id) + '">' + esc(g.nombre) + '</option>';
    }).join('');
    if (current) sel.value = current;

    // Selector del formulario de objetivo: sin gerencia + gerencias.
    var objSel = $('obj_gerenciaId');
    var currentObj = objSel.value;
    objSel.innerHTML = '<option value="">— Sin gerencia —</option>' + STATE.gerencias.map(function (g) {
      return '<option value="' + esc(g.id) + '">' + esc(g.nombre) + '</option>';
    }).join('');
    objSel.value = currentObj || gerenciaActiva() || '';
  }

  function fillObjetivoSelect() {
    var objetivos = scoped().objetivos;
    $('kr_objetivoId').innerHTML = objetivos.map(function (o) {
      return '<option value="' + esc(o.id) + '">' + esc(o.titulo) + ' (' + esc(o.trimestre) + ')</option>';
    }).join('') || '<option value="">— Crea un objetivo primero —</option>';
  }

  function krOptions() {
    return scoped().keyResults.map(function (kr) {
      return '<option value="' + esc(kr.id) + '">' + esc(kr.descripcion) + '</option>';
    }).join('') || '<option value="">— Crea un Key Result primero —</option>';
  }
  function fillKrSelect() { $('chk_krId').innerHTML = krOptions(); }
  function fillIniKrSelect() { $('ini_krId').innerHTML = krOptions(); }

  function fillScrumMasterSelect() {
    $('ini_scrumMasterId').innerHTML = '<option value="">— Sin asignar —</option>' +
      STATE.scrumMasters.map(function (sm) {
        var etiqueta = sm.nombre + (sm.equipo ? ' (' + sm.equipo + ')' : '');
        return '<option value="' + esc(sm.id) + '">' + esc(etiqueta) + '</option>';
      }).join('');
  }

  function smNombre(id) {
    var sm = STATE.scrumMasters.filter(function (s) { return s.id === id; })[0];
    return sm ? sm.nombre : '';
  }

  // ---------- Dashboard ----------
  // Calcula el resumen a partir del árbol ya filtrado por gerencia.
  function computeResumen(tree) {
    var r = { objetivos: tree.length, keyResults: 0, iniciativas: 0, iniciativasHechas: 0,
      onTrack: 0, atRisk: 0, offTrack: 0, sumProg: 0 };
    tree.forEach(function (n) {
      n.keyResults.forEach(function (kr) {
        r.keyResults++;
        r.sumProg += Number(kr.progreso) || 0;
        if (kr.estado === 'on-track') r.onTrack++;
        else if (kr.estado === 'at-risk') r.atRisk++;
        else r.offTrack++;
        (kr.iniciativas || []).forEach(function (i) {
          r.iniciativas++;
          if (i.estado === 'hecha') r.iniciativasHechas++;
        });
      });
    });
    r.progresoPromedio = r.keyResults ? Math.round(r.sumProg / r.keyResults) : 0;
    return r;
  }

  function renderResumen() {
    var r = computeResumen(scoped().tree);
    var cards = [
      ['Objetivos', r.objetivos || 0],
      ['Key Results', r.keyResults || 0],
      ['Iniciativas', (r.iniciativasHechas || 0) + '/' + (r.iniciativas || 0)],
      ['Progreso prom.', (r.progresoPromedio || 0) + '%'],
      ['On track', r.onTrack || 0],
      ['En riesgo', r.atRisk || 0],
      ['Fuera de ruta', r.offTrack || 0]
    ];
    $('resumen').innerHTML = cards.map(function (c) {
      return '<div class="card"><div class="n">' + esc(c[1]) + '</div><div class="l">' + esc(c[0]) + '</div></div>';
    }).join('');
  }

  function bar(progreso, estado) {
    return '<div class="bar ' + estado + '"><span style="width:' + progreso + '%"></span></div>';
  }

  function renderTree() {
    var filtro = $('dashTrimestre').value;
    var tree = scoped().tree.filter(function (n) { return !filtro || n.objetivo.trimestre === filtro; });
    if (!tree.length) { $('tree').innerHTML = '<div class="empty">Aún no hay objetivos. Ve a “Registrar OKRs”.</div>'; return; }
    $('tree').innerHTML = tree.map(function (n) {
      var krs = n.keyResults.map(function (kr) {
        var inis = (kr.iniciativas || []).map(function (i) {
          var sm = i.scrumMasterNombre ? ' · Agilista: ' + esc(i.scrumMasterNombre) : '';
          var sp = i.sprint ? ' · ' + esc(i.sprint) : '';
          return '<div class="ini-row"><span class="dot ' + i.estado + '"></span>' + esc(i.titulo) +
            '<span class="meta">' + sm + sp + '</span></div>';
        }).join('');
        var inisWrap = inis ? '<div class="inis">' + inis + '</div>' : '';
        var med = kr.medicion ? '<div class="kr-medicion">ƒ ' + esc(kr.medicion) + '</div>' : '';
        return '<div class="kr"><div class="kr-row"><div>' + esc(kr.descripcion) +
          ' <span class="meta">' + esc(kr.actual) + '/' + esc(kr.meta) + ' ' + esc(kr.unidad || '') + '</span></div>' +
          '<span class="pill ' + kr.estado + '">' + kr.progreso + '%</span></div>' +
          bar(kr.progreso, kr.estado) + med + inisWrap + '</div>';
      }).join('') || '<div class="meta" style="padding:8px 0">Sin Key Results.</div>';
      var ger = gerNombre(n.objetivo.gerenciaId);
      return '<div class="obj"><div class="obj-head"><div><div class="obj-title">' + esc(n.objetivo.titulo) +
        '</div><div class="meta">' + esc(n.objetivo.dueno || 'Sin dueño') + ' · ' + esc(n.objetivo.trimestre) +
        (ger ? ' · ' + esc(ger) : '') + '</div></div>' +
        '<span class="pill ' + n.estado + '">' + n.progreso + '%</span></div>' +
        bar(n.progreso, n.estado) + '<div style="margin-top:8px">' + krs + '</div></div>';
    }).join('');
  }
  document.getElementById('dashTrimestre').addEventListener('change', renderTree);

  // Al cambiar la gerencia activa, re-renderiza todas las vistas y ajusta el
  // valor por defecto del formulario de objetivo.
  document.getElementById('gerenciaActiva').addEventListener('change', function () {
    $('obj_gerenciaId').value = gerenciaActiva() || '';
    renderViews();
  });

  // ---------- Mapa (árbol / grafo) ----------
  var MAP = {
    OBJ_X: 12, KR_X: 320, INI_X: 628,
    OBJ_W: 260, KR_W: 268, INI_W: 250,
    MIN_H: 44, GAP: 12, PAD: 14
  };

  // Contenedor oculto para medir la altura real de cada nodo según su contenido.
  var mapMeasure = null;
  function measureNodeH(html, width) {
    if (!mapMeasure) {
      mapMeasure = document.createElement('div');
      mapMeasure.style.cssText = 'position:absolute;left:-9999px;top:0;visibility:hidden;';
      document.body.appendChild(mapMeasure);
    }
    mapMeasure.style.width = width + 'px';
    mapMeasure.innerHTML = html;
    var el = mapMeasure.firstElementChild;
    var h = el ? el.offsetHeight : MAP.MIN_H;
    return Math.max(h, MAP.MIN_H);
  }

  // Genera el bloque SVG de un objetivo con sus KRs e iniciativas (alturas auto).
  function mapaSvgObjetivo(n) {
    var edges = [], nodes = [];
    var y = MAP.PAD;
    var krCenters = [];

    n.keyResults.forEach(function (kr) {
      var inis = kr.iniciativas || [];

      // 1) Medir cada iniciativa y el KR según su contenido.
      var iniItems = inis.map(function (i) {
        var estado = i.estado || 'pendiente';
        var sm = i.scrumMasterNombre ? esc(i.scrumMasterNombre) : 'Sin asignar';
        var html = '<div class="map-node"><div class="t">' + esc(i.titulo) + '</div>' +
          '<div class="s"><span class="dot ' + estado + '"></span>' +
          esc(ESTADO_INI_LABEL[estado] || estado) + ' · Agilista: ' + sm + '</div></div>';
        return { html: html, h: measureNodeH(html, MAP.INI_W) };
      });
      var iniBlockH = iniItems.reduce(function (s, it) { return s + it.h; }, 0) +
        Math.max(0, iniItems.length - 1) * MAP.GAP;

      var krHtml = '<div class="map-node ' + kr.estado + '"><div class="t">' + esc(kr.descripcion) + '</div>' +
        '<div class="s"><span class="map-badge ' + kr.estado + '">' + kr.progreso + '%</span> · ' +
        esc(kr.actual) + '/' + esc(kr.meta) + ' ' + esc(kr.unidad || '') + '</div></div>';
      var krH = measureNodeH(krHtml, MAP.KR_W);

      var blockH = Math.max(iniBlockH, krH);
      var krCenter = y + blockH / 2;
      krCenters.push(krCenter);

      // 2) Colocar iniciativas centradas dentro del bloque + conectores.
      var iy = y + (blockH - iniBlockH) / 2;
      iniItems.forEach(function (it) {
        nodes.push(fo(MAP.INI_X, iy, MAP.INI_W, it.h, it.html));
        edges.push(edge(MAP.KR_X + MAP.KR_W, krCenter, MAP.INI_X, iy + it.h / 2));
        iy += it.h + MAP.GAP;
      });

      // 3) Nodo KR centrado sobre su bloque.
      nodes.push(fo(MAP.KR_X, krCenter - krH / 2, MAP.KR_W, krH, krHtml));

      y += blockH + MAP.GAP * 1.5;
    });

    // Nodo Objetivo, centrado sobre todos sus KRs.
    var objHtml = '<div class="map-node obj"><div class="t">' + esc(n.objetivo.titulo) + '</div>' +
      '<div class="s"><span class="map-badge ' + n.estado + '">' + n.progreso + '%</span> · ' +
      esc(n.objetivo.trimestre) + (n.objetivo.dueno ? ' · ' + esc(n.objetivo.dueno) : '') + '</div></div>';
    var objH = measureNodeH(objHtml, MAP.OBJ_W);
    var objCenter = krCenters.length
      ? (krCenters[0] + krCenters[krCenters.length - 1]) / 2
      : MAP.PAD + objH / 2;
    objCenter = Math.max(objCenter, MAP.PAD + objH / 2); // evita que se salga por arriba
    nodes.push(fo(MAP.OBJ_X, objCenter - objH / 2, MAP.OBJ_W, objH, objHtml));

    krCenters.forEach(function (c) {
      edges.unshift(edge(MAP.OBJ_X + MAP.OBJ_W, objCenter, MAP.KR_X, c));
    });

    if (!n.keyResults.length) {
      nodes.push(fo(MAP.KR_X, MAP.PAD, MAP.KR_W, MAP.MIN_H,
        '<div class="map-node"><div class="s">Sin Key Results asociados.</div></div>'));
    }

    var totalH = Math.max(y, objCenter + objH / 2 + MAP.PAD, MAP.MIN_H + 2 * MAP.PAD);
    var w = MAP.INI_X + MAP.INI_W + MAP.PAD;
    return '<div class="map-obj"><svg width="' + w + '" height="' + totalH +
      '" viewBox="0 0 ' + w + ' ' + totalH + '">' +
      edges.join('') + nodes.join('') + '</svg></div>';
  }

  // Conector curvo (bezier) entre dos puntos.
  function edge(x1, y1, x2, y2) {
    var mx = (x1 + x2) / 2;
    return '<path class="map-edge" d="M' + x1 + ',' + y1 + ' C' + mx + ',' + y1 + ' ' + mx + ',' + y2 + ' ' + x2 + ',' + y2 + '"/>';
  }

  // foreignObject con HTML dentro del SVG (permite que el texto se ajuste).
  function fo(x, y, w, h, html) {
    return '<foreignObject x="' + x + '" y="' + y + '" width="' + w + '" height="' + h + '">' +
      '<div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%">' + html + '</div></foreignObject>';
  }

  function mapaHeader() {
    var w = MAP.INI_X + MAP.INI_W + MAP.PAD;
    function col(x, cw, txt) {
      return '<span style="position:absolute;left:' + x + 'px;width:' + cw + 'px">' + txt + '</span>';
    }
    return '<div class="map-header" style="width:' + w + 'px">' +
      col(MAP.OBJ_X, MAP.OBJ_W, 'Objetivo') +
      col(MAP.KR_X, MAP.KR_W, 'Key Result') +
      col(MAP.INI_X, MAP.INI_W, 'Iniciativas') +
      '</div>';
  }

  function renderMapa() {
    var filtro = $('mapaTrimestre').value;
    var tree = scoped().tree.filter(function (n) { return !filtro || n.objetivo.trimestre === filtro; });
    if (!tree.length) { $('mapaCanvas').innerHTML = '<div class="empty">Aún no hay objetivos. Ve a “Registrar OKRs”.</div>'; return; }
    $('mapaCanvas').innerHTML = mapaHeader() + tree.map(mapaSvgObjetivo).join('');
  }
  document.getElementById('mapaTrimestre').addEventListener('change', renderMapa);

  // ---------- Gerencias ----------
  $('gerForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var data = { id: $('ger_id').value, nombre: $('ger_nombre').value };
    google.script.run
      .withSuccessHandler(function () { toast('Gerencia guardada'); $('gerForm').reset(); $('ger_id').value = ''; refresh(); })
      .withFailureHandler(function (err) { toast(err.message || err, true); })
      .saveGerencia(data);
  });

  function renderGerencias() {
    if (!STATE.gerencias.length) { $('gerList').innerHTML = '<div class="meta">Aún no hay gerencias. Añade la primera para poder filtrar por área.</div>'; return; }
    $('gerList').innerHTML = STATE.gerencias.map(function (g) {
      return '<span class="chip">' + esc(g.nombre) +
        ' <a onclick="editGer(\'' + g.id + '\')">editar</a>' +
        ' <a class="danger" onclick="delGer(\'' + g.id + '\')">✕</a></span>';
    }).join('');
  }
  window.editGer = function (id) {
    var g = STATE.gerencias.filter(function (x) { return x.id === id; })[0];
    if (!g) return;
    $('ger_id').value = g.id; $('ger_nombre').value = g.nombre; $('ger_nombre').focus();
  };
  window.delGer = function (id) {
    if (!confirm('¿Eliminar esta gerencia? Sus objetivos quedarán sin gerencia asignada.')) return;
    google.script.run.withSuccessHandler(function () { toast('Gerencia eliminada'); refresh(); })
      .withFailureHandler(function (e) { toast(e.message || e, true); }).deleteGerencia(id);
  };

  // ---------- Registrar OKRs ----------
  $('objForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var data = {
      id: $('obj_id').value,
      titulo: $('obj_titulo').value,
      dueno: $('obj_dueno').value,
      trimestre: $('obj_trimestre').value,
      descripcion: $('obj_descripcion').value,
      gerenciaId: $('obj_gerenciaId').value
    };
    google.script.run
      .withSuccessHandler(function () { toast('Objetivo guardado'); $('objForm').reset(); $('obj_id').value = ''; $('obj_gerenciaId').value = gerenciaActiva() || ''; refresh(); })
      .withFailureHandler(function (err) { toast(err.message || err, true); })
      .saveObjetivo(data);
  });
  $('objReset').addEventListener('click', function () { $('objForm').reset(); $('obj_id').value = ''; $('obj_gerenciaId').value = gerenciaActiva() || ''; });

  $('krForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var data = {
      id: $('kr_id').value,
      objetivoId: $('kr_objetivoId').value,
      descripcion: $('kr_descripcion').value,
      dueno: $('kr_dueno').value,
      unidad: $('kr_unidad').value,
      baseline: $('kr_baseline').value,
      meta: $('kr_meta').value,
      actual: $('kr_actual').value,
      medicion: $('kr_medicion').value
    };
    google.script.run
      .withSuccessHandler(function () { toast('Key Result guardado'); $('krForm').reset(); $('kr_id').value = ''; refresh(); })
      .withFailureHandler(function (err) { toast(err.message || err, true); })
      .saveKeyResult(data);
  });
  $('krReset').addEventListener('click', function () { $('krForm').reset(); $('kr_id').value = ''; });

  function renderOkrList() {
    var S = scoped();
    if (!S.objetivos.length) { $('okrList').innerHTML = '<div class="empty">Sin objetivos aún.</div>'; return; }
    $('okrList').innerHTML = S.objetivos.map(function (o) {
      var krs = S.keyResults.filter(function (k) { return k.objetivoId === o.id; });
      var krHtml = krs.map(function (kr) {
        var med = kr.medicion ? '<div class="kr-medicion">ƒ ' + esc(kr.medicion) + '</div>' : '';
        return '<div class="kr"><div class="kr-row"><div>' + esc(kr.descripcion) + ' <span class="pill ' + kr.estado + '">' + kr.progreso + '%</span></div>' +
          '<div class="row-actions"><button class="ghost" onclick="editKr(\'' + kr.id + '\')">Editar</button>' +
          '<button class="ghost danger" onclick="delKr(\'' + kr.id + '\')">Eliminar</button></div></div>' + med + '</div>';
      }).join('') || '<div class="meta" style="padding:6px 0">Sin KRs.</div>';
      return '<div class="obj"><div class="obj-head"><div class="obj-title">' + esc(o.titulo) + '</div>' +
        '<div class="row-actions"><button class="ghost" onclick="editObj(\'' + o.id + '\')">Editar</button>' +
        '<button class="ghost danger" onclick="delObj(\'' + o.id + '\')">Eliminar</button></div></div>' +
        '<div class="meta">' + esc(o.dueno || 'Sin dueño') + ' · ' + esc(o.trimestre) + '</div>' +
        '<div style="margin-top:8px">' + krHtml + '</div></div>';
    }).join('');
  }

  window.editObj = function (id) {
    var o = STATE.objetivos.filter(function (x) { return x.id === id; })[0];
    if (!o) return;
    $('obj_id').value = o.id; $('obj_titulo').value = o.titulo; $('obj_dueno').value = o.dueno;
    $('obj_trimestre').value = o.trimestre; $('obj_descripcion').value = o.descripcion;
    $('obj_gerenciaId').value = o.gerenciaId || '';
    $('obj_titulo').scrollIntoView({ behavior: 'smooth' });
  };
  window.delObj = function (id) {
    if (!confirm('¿Eliminar el objetivo y todos sus Key Results?')) return;
    google.script.run.withSuccessHandler(function () { toast('Objetivo eliminado'); refresh(); })
      .withFailureHandler(function (e) { toast(e.message || e, true); }).deleteObjetivo(id);
  };
  window.editKr = function (id) {
    var kr = STATE.keyResults.filter(function (x) { return x.id === id; })[0];
    if (!kr) return;
    $('kr_id').value = kr.id; $('kr_objetivoId').value = kr.objetivoId; $('kr_descripcion').value = kr.descripcion;
    $('kr_dueno').value = kr.dueno; $('kr_unidad').value = kr.unidad; $('kr_baseline').value = kr.baseline;
    $('kr_meta').value = kr.meta; $('kr_actual').value = kr.actual; $('kr_medicion').value = kr.medicion || '';
    $('kr_descripcion').scrollIntoView({ behavior: 'smooth' });
  };
  window.delKr = function (id) {
    if (!confirm('¿Eliminar este Key Result y sus check-ins?')) return;
    google.script.run.withSuccessHandler(function () { toast('Key Result eliminado'); refresh(); })
      .withFailureHandler(function (e) { toast(e.message || e, true); }).deleteKeyResult(id);
  };

  // ---------- Scrum Masters ----------
  $('smForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var data = { id: $('sm_id').value, nombre: $('sm_nombre').value, equipo: $('sm_equipo').value };
    google.script.run
      .withSuccessHandler(function () { toast('Agilista guardado'); $('smForm').reset(); $('sm_id').value = ''; refresh(); })
      .withFailureHandler(function (err) { toast(err.message || err, true); })
      .saveScrumMaster(data);
  });

  function renderScrumMasters() {
    if (!STATE.scrumMasters.length) { $('smList').innerHTML = '<div class="meta">Aún no hay Agilistas. Añade el primero arriba.</div>'; return; }
    $('smList').innerHTML = STATE.scrumMasters.map(function (sm) {
      return '<span class="chip">' + esc(sm.nombre) + (sm.equipo ? ' · ' + esc(sm.equipo) : '') +
        ' <a onclick="editSm(\'' + sm.id + '\')">editar</a>' +
        ' <a class="danger" onclick="delSm(\'' + sm.id + '\')">✕</a></span>';
    }).join('');
  }
  window.editSm = function (id) {
    var sm = STATE.scrumMasters.filter(function (x) { return x.id === id; })[0];
    if (!sm) return;
    $('sm_id').value = sm.id; $('sm_nombre').value = sm.nombre; $('sm_equipo').value = sm.equipo;
    $('sm_nombre').focus();
  };
  window.delSm = function (id) {
    if (!confirm('¿Eliminar este Agilista? Sus iniciativas quedarán sin asignar.')) return;
    google.script.run.withSuccessHandler(function () { toast('Agilista eliminado'); refresh(); })
      .withFailureHandler(function (e) { toast(e.message || e, true); }).deleteScrumMaster(id);
  };

  // ---------- Iniciativas ----------
  $('iniForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var data = {
      id: $('ini_id').value,
      krId: $('ini_krId').value,
      titulo: $('ini_titulo').value,
      scrumMasterId: $('ini_scrumMasterId').value,
      estado: $('ini_estado').value,
      sprint: $('ini_sprint').value,
      descripcion: $('ini_descripcion').value
    };
    google.script.run
      .withSuccessHandler(function () { toast('Iniciativa guardada'); $('iniForm').reset(); $('ini_id').value = ''; refresh(); })
      .withFailureHandler(function (err) { toast(err.message || err, true); })
      .saveIniciativa(data);
  });
  $('iniReset').addEventListener('click', function () { $('iniForm').reset(); $('ini_id').value = ''; });

  function krDescById(krId) {
    var kr = STATE.keyResults.filter(function (k) { return k.id === krId; })[0];
    return kr ? kr.descripcion : krId;
  }
  function renderIniciativas() {
    var inis = scoped().iniciativas;
    if (!inis.length) { $('iniList').innerHTML = '<div class="empty">Sin iniciativas aún.</div>'; return; }
    var rows = inis.map(function (i) {
      return '<tr><td><span class="dot ' + i.estado + '"></span>' + esc(i.titulo) + '</td>' +
        '<td>' + esc(krDescById(i.krId)) + '</td>' +
        '<td>' + esc(smNombre(i.scrumMasterId) || '—') + '</td>' +
        '<td>' + esc(ESTADO_INI_LABEL[i.estado] || i.estado) + '</td>' +
        '<td>' + esc(i.sprint || '') + '</td>' +
        '<td><div class="row-actions"><button class="ghost" onclick="editIni(\'' + i.id + '\')">Editar</button>' +
        '<button class="ghost danger" onclick="delIni(\'' + i.id + '\')">✕</button></div></td></tr>';
    }).join('');
    $('iniList').innerHTML = '<table><thead><tr><th>Iniciativa</th><th>Key Result</th><th>Agilista</th><th>Estado</th><th>Sprint</th><th></th></tr></thead><tbody>' + rows + '</tbody></table>';
  }
  window.editIni = function (id) {
    var i = STATE.iniciativas.filter(function (x) { return x.id === id; })[0];
    if (!i) return;
    $('ini_id').value = i.id; $('ini_krId').value = i.krId; $('ini_titulo').value = i.titulo;
    $('ini_scrumMasterId').value = i.scrumMasterId; $('ini_estado').value = i.estado;
    $('ini_sprint').value = i.sprint; $('ini_descripcion').value = i.descripcion;
    $('ini_titulo').scrollIntoView({ behavior: 'smooth' });
  };
  window.delIni = function (id) {
    if (!confirm('¿Eliminar esta iniciativa?')) return;
    google.script.run.withSuccessHandler(function () { toast('Iniciativa eliminada'); refresh(); })
      .withFailureHandler(function (e) { toast(e.message || e, true); }).deleteIniciativa(id);
  };

  // ---------- Check-ins ----------
  $('chkForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var data = {
      krId: $('chk_krId').value,
      valor: $('chk_valor').value,
      confianza: $('chk_confianza').value,
      autor: $('chk_autor').value,
      fecha: $('chk_fecha').value,
      comentario: $('chk_comentario').value
    };
    google.script.run
      .withSuccessHandler(function () { toast('Check-in registrado'); $('chkForm').reset(); refresh(); })
      .withFailureHandler(function (err) { toast(err.message || err, true); })
      .addCheckin(data);
  });

  function krDesc(krId) {
    var kr = STATE.keyResults.filter(function (k) { return k.id === krId; })[0];
    return kr ? kr.descripcion : krId;
  }
  function renderCheckins() {
    var checkins = scoped().checkins;
    if (!checkins.length) { $('chkList').innerHTML = '<div class="empty">Sin check-ins aún.</div>'; return; }
    var rows = checkins.map(function (c) {
      return '<tr><td>' + esc(c.fecha) + '</td><td>' + esc(krDesc(c.krId)) + '</td><td>' + esc(c.valor) +
        '</td><td>' + esc(c.progreso) + '%</td><td>' + esc(c.confianza) + '</td><td>' + esc(c.comentario || '') +
        '</td><td><button class="ghost danger" onclick="delChk(\'' + c.id + '\')">✕</button></td></tr>';
    }).join('');
    $('chkList').innerHTML = '<table><thead><tr><th>Fecha</th><th>Key Result</th><th>Valor</th><th>Progreso</th><th>Confianza</th><th>Comentario</th><th></th></tr></thead><tbody>' + rows + '</tbody></table>';
  }
  window.delChk = function (id) {
    if (!confirm('¿Eliminar este check-in?')) return;
    google.script.run.withSuccessHandler(function () { toast('Check-in eliminado'); refresh(); })
      .withFailureHandler(function (e) { toast(e.message || e, true); }).deleteCheckin(id);
  };

  // ---------- Reportes ----------
  $('repForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var t = $('rep_trimestre').value;
    if (!t) { toast('Elige un trimestre', true); return; }
    $('repResult').innerHTML = '<div class="meta">Generando…</div>';
    google.script.run
      .withSuccessHandler(function (res) {
        $('repResult').innerHTML = '<div class="obj"><div class="obj-title">' + esc(res.nombre) + '</div>' +
          '<div class="meta">' + res.filas + ' filas generadas en la hoja del Spreadsheet.</div>' +
          '<p><a class="primary" style="display:inline-block;text-decoration:none;margin-top:8px" target="_blank" href="' + esc(res.url) + '">Abrir hoja del reporte ↗</a></p></div>';
        toast('Reporte generado');
      })
      .withFailureHandler(function (err) { $('repResult').innerHTML = ''; toast(err.message || err, true); })
      .generarReporteTrimestre(t, gerenciaActiva());
  });

  bootstrap();
</script>
